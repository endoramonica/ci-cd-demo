<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Branch Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app">
        <!-- Header -->
        <header class="header">
            <h1>Git Branch Manager</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>
        
        <!-- Main Container -->
        <main class="container">
            <div class="branch-manager">
                <!-- Branch dropdown -->
                <div class="dropdown-wrapper">
                    <button id="dropdownBtn" class="dropdown-btn">
                        <span id="selectedBranch">Select a branch</span>
                        <span class="dropdown-icon">▼</span>
                    </button>
                    
                    <div id="dropdownMenu" class="dropdown-menu hidden">
                        <ul id="branchList" class="branch-list">
                            <!-- Branches will be populated here -->
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
