<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Branch Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app">
        <header class="header">
            <h1>Git Branch Manager</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </header>
        
        <main class="container">
            <div class="branch-manager">
                <!-- Search input -->
                <div class="search-section">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Search branches..."
                    >
                </div>

                <!-- Branch count -->
                <div class="branch-info">
                    <span id="branchCount" class="branch-count">Branches (0)</span>
                </div>

                <!-- Branch dropdown -->
                <div class="dropdown-wrapper">
                    <button id="dropdownBtn" class="dropdown-btn">
                        <span id="selectedBranch">Select a branch</span>
                        <span class="dropdown-icon">▼</span>
                    </button>
                    
                    <div id="dropdownMenu" class="dropdown-menu hidden">
                        <ul id="branchList" class="branch-list">
                            <!-- Branches will be populated here -->
                        </ul>
                    </div>
                </div>

                <!-- Selected branch info -->
                <div id="selectedInfo" class="selected-info hidden">
                    <p>Selected: <strong id="selectedBranchName"></strong></p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
